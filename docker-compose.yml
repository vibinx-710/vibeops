version: '3.8'

networks:
  vibeops-network:
    driver: bridge

volumes:
  mlflow-data:
  prometheus-data:
  grafana-data:
  airflow-data:

services:

  # ─── MLflow ───────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    networks:
      - vibeops-network

  # ─── Prometheus ───────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./services/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    networks:
      - vibeops-network

  # ─── Grafana ──────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./services/grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=vibeops123
    networks:
      - vibeops-network

  # ─── FastAPI ──────────────────────────────────────
  fastapi:
    build: ./services/fastapi
    container_name: fastapi
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    networks:
      - vibeops-network

